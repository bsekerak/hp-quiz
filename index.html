<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Which Harry Potter Character Are You? | Wizarding World Quiz</title>
    <meta name="description" content="Take our free personality quiz to discover which Harry Potter character you are most like. Answer 12 questions and reveal your wizarding identity — Harry, Hermione, Ron, Luna, Snape and more." />
    <meta name="keywords" content="Harry Potter quiz, which Harry Potter character are you, Harry Potter personality test, Hogwarts quiz, wizarding world quiz, Harry Potter MBTI, Hermione Granger, Ron Weasley, Luna Lovegood, Severus Snape, Draco Malfoy" />
    <meta name="author" content="Wizarding World Quiz" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://wizardingworldquiz.com/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wizardingworldquiz.com/" />
    <meta property="og:title" content="Which Harry Potter Character Are You? | Wizarding World Quiz" />
    <meta property="og:description" content="Discover your wizarding identity. Answer 12 personality questions and find out if you're most like Harry, Hermione, Ron, Luna, Snape, Dumbledore and more." />
    <meta property="og:image" content="https://wizardingworldquiz.com/og-image.jpg" />
    <meta property="og:site_name" content="Wizarding World Quiz" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://wizardingworldquiz.com/" />
    <meta name="twitter:title" content="Which Harry Potter Character Are You?" />
    <meta name="twitter:description" content="Take the free personality quiz and discover your wizarding identity. 12 questions, 10 characters, instant results." />
    <meta name="twitter:image" content="https://wizardingworldquiz.com/og-image.jpg" />

    <!-- Structured Data — WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Wizarding World Quiz",
      "url": "https://wizardingworldquiz.com",
      "description": "A free Harry Potter personality quiz that tells you which character you are most like based on 12 questions.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://wizardingworldquiz.com/characters/{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data — Quiz -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Quiz",
      "name": "Which Harry Potter Character Are You?",
      "description": "A 12-question personality quiz that matches you with one of 10 iconic Harry Potter characters based on your values, instincts, and personality traits.",
      "url": "https://wizardingworldquiz.com",
      "educationalLevel": "all ages",
      "about": {
        "@type": "Thing",
        "name": "Harry Potter characters and personality types"
      },
      "provider": {
        "@type": "Organization",
        "name": "Wizarding World Quiz",
        "url": "https://wizardingworldquiz.com"
      }
    }
    </script>

    <!-- Structured Data — FAQ (helps LLMs and Google answer questions) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Which Harry Potter character are you?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Take our free 12-question personality quiz at wizardingworldquiz.com to find out which Harry Potter character matches your personality. You could be Harry Potter (ISFP), Hermione Granger (ESTJ), Ron Weasley (ESFP), Luna Lovegood (INFP), Neville Longbottom (ISFJ), Albus Dumbledore (INFJ), Severus Snape (INTJ), Draco Malfoy (ESTJ), Ginny Weasley (ESTP), or Sirius Black (ENFP)."
          }
        },
        {
          "@type": "Question",
          "name": "What MBTI type is Hermione Granger?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hermione Granger is commonly typed as ESTJ — The Executive. She is organized, principled, relentlessly capable, and devoted to doing things the right way."
          }
        },
        {
          "@type": "Question",
          "name": "What MBTI type is Harry Potter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Harry Potter is commonly typed as ISFP — The Adventurer. He is fiercely independent, guided by values over rules, instinctively brave, and deeply loyal to those he loves."
          }
        },
        {
          "@type": "Question",
          "name": "What MBTI type is Severus Snape?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Severus Snape is commonly typed as INTJ — The Architect. He is strategic, private, disciplined, and driven by a deeply held loyalty that almost no one around him fully understood."
          }
        },
        {
          "@type": "Question",
          "name": "What are the four Hogwarts houses?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The four Hogwarts houses are Gryffindor (brave, daring, chivalrous), Slytherin (ambitious, cunning, resourceful), Ravenclaw (wise, witty, curious), and Hufflepuff (loyal, patient, hard-working)."
          }
        },
        {
          "@type": "Question",
          "name": "What MBTI type is Luna Lovegood?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Luna Lovegood is commonly typed as INFP — The Mediator. She is a dreamer guided by deep personal values, open-minded, quietly perceptive, and never apologizes for her unique worldview."
          }
        },
        {
          "@type": "Question",
          "name": "What MBTI type is Draco Malfoy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Draco Malfoy is commonly typed as ESTJ — The Executive. He is ambitious, proud, and driven by external expectations, though his arc involves slowly questioning the rigid worldview he was raised with."
          }
        },
        {
          "@type": "Question",
          "name": "What MBTI type is Dumbledore?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Albus Dumbledore is commonly typed as INFJ — The Advocate. He is a visionary who thinks in long arcs, sacrifices short-term comfort for long-term good, and believes deeply in the power of love."
          }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: #0A0A1A;
        color: #F5E6C8;
        font-family: 'Crimson Text', serif;
        min-height: 100vh;
        overflow-x: hidden;
      }
      #root { width: 100%; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
